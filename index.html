<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#F9F5EE">
    <title>RSVP — Wedding Celebration</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Great+Vibes&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="page">
        <!-- Decorative foliage: top left -->
        <div class="deco deco-foliage-top-left" aria-hidden="true">
            <svg viewBox="0 0 120 140" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M8 12c2-4 8-6 14-4 5 2 10 8 12 14 1 4 0 10-3 14-4 6-12 8-18 4-5-3-7-10-5-16 2-5 8-8 14-7 6 1 11 5 12 11" fill="#7d9b76" opacity="0.85"/>
                <path d="M22 28c3-2 8-1 11 3 2 3 2 7 0 10-2 4-6 6-10 5-4-1-7-4-8-8-1-3 0-7 3-9 4-2 9-1 12 2" fill="#8fa88a" opacity="0.75"/>
                <path d="M18 48c4 0 8 3 9 7 1 4-1 8-5 10-4 2-9 1-12-2-3-3-4-8-2-12 2-4 6-6 11-4 15 2 4 6 6 10 5" fill="#6b8c67" opacity="0.8"/>
                <path d="M30 62c2 3 1 7-2 9-3 2-7 2-10-1-2-3-2-7 1-9 3-2 7-1 10 2 3 2 6 2 9 0" fill="#7d9b76" opacity="0.7"/>
            </svg>
        </div>
        <!-- Decorative foliage: top right -->
        <div class="deco deco-foliage-top-right" aria-hidden="true">
            <svg viewBox="0 0 100 120" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M92 18c-3-2-8-1-11 2-2 3-2 7 0 10 3 3 7 4 11 2 4-2 6-6 5-10-1-4-5-6-9-5-4 1-7 4-7 8" fill="#7d9b76" opacity="0.85"/>
                <path d="M78 35c-2 2-2 6 0 9 2 3 6 4 9 2 3-2 4-6 2-9-2-3-6-4-9-2-3 2-4 6-2 9" fill="#8fa88a" opacity="0.75"/>
                <path d="M85 52c-3 1-6 4-6 8 0 4 3 7 7 8 4 1 8-1 10-4 2-3 1-7-2-9-3-2-7-2-10 0" fill="#6b8c67" opacity="0.8"/>
            </svg>
        </div>
        <!-- Decorative foliage: bottom left (vine near champagne) -->
        <div class="deco deco-vine-bottom-left" aria-hidden="true">
            <svg viewBox="0 0 80 60" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M10 50c4-8 12-12 20-10 6 2 10 8 10 14 0 5-4 9-9 10-5 1-10-2-13-6" fill="#7d9b76" opacity="0.6"/>
                <path d="M25 38c2-3 6-4 9-2 3 2 4 6 2 9-2 3-6 4-9 2" fill="#8fa88a" opacity="0.5"/>
            </svg>
        </div>
        <!-- Champagne coupe line art -->
        <div class="deco deco-champagne" aria-hidden="true">
            <svg viewBox="0 0 50 80" fill="none" stroke="#2c2c2c" stroke-width="0.8" stroke-linecap="round" xmlns="http://www.w3.org/2000/svg">
                <path d="M25 8v44M12 52h26M15 52l3 20h14l3-20M22 72l3 6 3-6"/>
                <path d="M25 20c-6 0-10 4-10 10s4 10 10 10 10-4 10-10-4-10-10-10z"/>
                <path d="M18 52c0-4 3-8 7-8s7 4 7 8" stroke="#2c2c2c" fill="none"/>
                <circle cx="25" cy="75" r="2" fill="none" stroke="#2c2c2c"/>
            </svg>
        </div>

        <main class="form-wrapper">
            <div class="form-frame">
                <div class="form-frame-inner">
                    <h1 class="form-title">Kindly R.S.V.P.</h1>
                    <p class="form-subtitle">Please respond by March 24, 2026</p>
                    <div class="form-divider"></div>

                    <form id="rsvpForm" class="rsvp-form" action="#" method="post" novalidate data-api="https://formspree.io/f/xqedoopl">
                        <div class="field-group">
                            <label for="name">Your name</label>
                            <input type="text" id="name" name="name" placeholder="Full name" required autocomplete="name">
                        </div>
                        <div class="field-group">
                            <label for="email">Email</label>
                            <input type="email" id="email" name="email" placeholder="your@email.com" required autocomplete="email">
                        </div>
                        <div class="field-group">
                            <label>Will you join us?</label>
                            <div class="radio-group">
                                <label class="radio-option">
                                    <input type="radio" name="attending" value="yes" required>
                                    <span class="radio-label">Joyfully accept</span>
                                </label>
                                <label class="radio-option">
                                    <input type="radio" name="attending" value="no">
                                    <span class="radio-label">Regretfully decline</span>
                                </label>
                            </div>
                        </div>
                        <div class="field-group field-guest" id="fieldGuest">
                            <label>Bringing a guest?</label>
                            <p class="field-hint">You may bring one plus one only.</p>
                            <div class="radio-group">
                                <label class="radio-option">
                                    <input type="radio" name="bringing_guest" value="no" checked>
                                    <span class="radio-label">No, just me</span>
                                </label>
                                <label class="radio-option">
                                    <input type="radio" name="bringing_guest" value="yes">
                                    <span class="radio-label">Yes, one guest</span>
                                </label>
                            </div>
                        </div>
                        <div class="field-group field-guest-name js-guest-name" id="fieldGuestName" hidden>
                            <label for="guest_name">Guest’s name</label>
                            <input type="text" id="guest_name" name="guest_name" placeholder="Full name of your guest" autocomplete="off">
                        </div>
                        <div class="field-group">
                            <label for="dietary">Dietary requirements or notes</label>
                            <textarea id="dietary" name="dietary" rows="3" placeholder="Optional"></textarea>
                        </div>
                        <p id="formError" class="form-error hidden" role="alert"></p>
                        <button type="submit" class="btn-submit" id="submitBtn">Send response</button>
                    </form>
                </div>
            </div>
        </main>

        <!-- Ornate gold flourish (subtle) -->
        <div class="deco deco-gold-flourish" aria-hidden="true">
            <svg viewBox="0 0 120 40" fill="none" stroke="#b8a574" stroke-width="0.6" opacity="0.7" xmlns="http://www.w3.org/2000/svg">
                <path d="M0 20 Q30 5 60 20 T120 20"/>
                <path d="M20 20c0-6 8-10 16-8 6 2 10 8 8 14-2 6-8 10-14 8-6-2-10-8-8-14"/>
                <path d="M100 20c0-6-8-10-16-8-6 2-10 8-8 14 2 6 8 10 14 8 6-2 10-8 8-14"/>
            </svg>
        </div>
    </div>

    <div id="thankYou" class="thank-you hidden" aria-live="polite">
        <div class="thank-you-inner">
            <h2 class="thank-you-title">Thank you</h2>
            <p class="thank-you-text">We look forward to celebrating with you.</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
